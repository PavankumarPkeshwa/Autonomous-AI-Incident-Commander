<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autonomous Incident Commander</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --primary-color: #667eea;
            --primary-dark: #764ba2;
            --primary-light: #8b9eff;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --error-color: #ef4444;
            --info-color: #3b82f6;
            --bg-primary: #ffffff;
            --bg-secondary: #f9fafb;
            --bg-tertiary: #f3f4f6;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --text-tertiary: #9ca3af;
            --border-color: #e5e7eb;
            --critical: #ef4444;
            --high: #f97316;
            --medium: #eab308;
            --low: #22c55e;
            --spacing-xs: 0.5rem;
            --spacing-sm: 1rem;
            --spacing-md: 1.5rem;
            --spacing-lg: 2rem;
            --spacing-xl: 2.5rem;
            --spacing-2xl: 3rem;
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            --transition-normal: 300ms ease-in-out;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        #root {
            min-height: 100vh;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: var(--radius-md);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-tertiary);
        }

        /* App Layout */
        .app {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            color: white;
            padding: var(--spacing-lg) var(--spacing-2xl);
            box-shadow: var(--shadow-lg);
        }

        .header-content {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-section {
            display: flex;
            gap: var(--spacing-md);
            align-items: center;
        }

        .logo {
            font-size: 2.5rem;
            line-height: 1;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .title {
            font-size: 1.75rem;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 0.875rem;
            opacity: 0.9;
            margin: 0.25rem 0 0 0;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            background: rgba(255, 255, 255, 0.1);
            padding: var(--spacing-sm) var(--spacing-md);
            border-radius: 9999px;
            backdrop-filter: blur(10px);
            font-size: 0.875rem;
            font-weight: 500;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 2s infinite;
            background: var(--success-color);
            box-shadow: 0 0 10px var(--success-color);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .main-container {
            flex: 1;
            padding: var(--spacing-lg);
        }

        .content-wrapper {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: var(--spacing-lg);
            max-width: 1600px;
            margin: 0 auto;
            height: 100%;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-lg);
        }

        .main-content {
            background: white;
            border-radius: var(--radius-xl);
            padding: var(--spacing-2xl);
            box-shadow: var(--shadow-xl);
            overflow-y: auto;
            max-height: calc(100vh - 200px);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            color: var(--text-secondary);
        }

        .empty-state h3 {
            color: var(--text-primary);
            margin-bottom: var(--spacing-sm);
            font-size: 1.25rem;
        }

        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-md);
            min-height: 400px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border-color);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .spinner-small {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: var(--spacing-xs);
        }

        /* Form Styles */
        .incident-form-container {
            background: white;
            border-radius: var(--radius-xl);
            padding: var(--spacing-xl);
            box-shadow: var(--shadow-xl);
        }

        .form-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: var(--spacing-lg);
            color: var(--text-primary);
        }

        .incident-form {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-xs);
        }

        .form-group label {
            font-weight: 500;
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .form-textarea,
        .form-select {
            padding: var(--spacing-md);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 0.95rem;
            color: var(--text-primary);
            background: var(--bg-primary);
            transition: all var(--transition-normal);
            resize: vertical;
        }

        .form-textarea {
            min-height: 120px;
            line-height: 1.5;
        }

        .form-textarea:focus,
        .form-select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background: var(--bg-secondary);
        }

        .form-textarea:disabled,
        .form-select:disabled {
            background: var(--bg-tertiary);
            cursor: not-allowed;
            opacity: 0.6;
        }

        .form-select {
            cursor: pointer;
        }

        .submit-button {
            padding: var(--spacing-md) var(--spacing-lg);
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-normal);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-xs);
            margin-top: var(--spacing-md);
        }

        .submit-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .submit-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* List Styles */
        .incident-list-container {
            background: white;
            border-radius: var(--radius-xl);
            padding: var(--spacing-xl);
            box-shadow: var(--shadow-xl);
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
            height: fit-content;
        }

        .list-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .count {
            background: var(--primary-color);
            color: white;
            padding: 0.25rem var(--spacing-sm);
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 700;
        }

        .empty-list {
            text-align: center;
            padding: var(--spacing-lg);
            color: var(--text-secondary);
        }

        .empty-list p {
            margin: 0;
            font-weight: 500;
        }

        .incident-list {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
            max-height: 500px;
            overflow-y: auto;
        }

        .incident-item {
            padding: var(--spacing-md);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition-normal);
            background: var(--bg-primary);
        }

        .incident-item:hover {
            border-color: var(--primary-color);
            background: var(--bg-secondary);
            transform: translateX(4px);
        }

        .incident-item.active {
            border-color: var(--primary-color);
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05) 0%, rgba(118, 75, 162, 0.05) 100%);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .incident-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-xs);
        }

        .incident-id {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: 'Courier New', monospace;
        }

        .severity-badge {
            padding: 0.25rem var(--spacing-sm);
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .severity-badge.critical {
            background: rgba(239, 68, 68, 0.2);
            color: var(--critical);
        }

        .severity-badge.high {
            background: rgba(249, 115, 22, 0.2);
            color: var(--high);
        }

        .severity-badge.medium {
            background: rgba(234, 179, 8, 0.2);
            color: var(--medium);
        }

        .severity-badge.low {
            background: rgba(34, 197, 94, 0.2);
            color: var(--low);
        }

        .incident-status {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* Details Styles */
        .incident-details {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-xl);
        }

        .details-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding-bottom: var(--spacing-lg);
            border-bottom: 2px solid var(--border-color);
        }

        .details-header h2 {
            font-size: 1.75rem;
            margin: 0 0 var(--spacing-xs) 0;
        }

        .incident-timestamp {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin: 0;
        }

        .status-badge {
            padding: var(--spacing-sm) var(--spacing-md);
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.95rem;
            white-space: nowrap;
        }

        .status-badge.resolved {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success-color);
        }

        .status-badge.failed {
            background: rgba(239, 68, 68, 0.2);
            color: var(--error-color);
        }

        .status-badge.processing {
            background: rgba(59, 130, 246, 0.2);
            color: var(--info-color);
        }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-lg);
        }

        .detail-section {
            background: var(--bg-secondary);
            border-left: 4px solid var(--primary-color);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            transition: all var(--transition-normal);
        }

        .detail-section:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .detail-section.highlight {
            border-left-color: var(--warning-color);
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.05) 0%, rgba(245, 158, 11, 0.02) 100%);
        }

        .detail-section.success {
            border-left-color: var(--success-color);
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.05) 0%, rgba(16, 185, 129, 0.02) 100%);
        }

        .detail-section.root-cause {
            border-left-color: var(--error-color);
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.05) 0%, rgba(239, 68, 68, 0.02) 100%);
            grid-column: 1 / -1;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0 0 var(--spacing-md) 0;
            color: var(--text-primary);
        }

        .section-content {
            color: var(--text-secondary);
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
            margin: 0;
        }

        .findings-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
        }

        .findings-list li {
            padding: var(--spacing-sm) var(--spacing-md);
            background: white;
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            border-left: 3px solid var(--primary-color);
            line-height: 1.6;
        }

        .action-log {
            background: var(--text-primary);
            color: var(--success-color);
            padding: var(--spacing-md);
            border-radius: var(--radius-md);
            overflow-x: auto;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.85rem;
            line-height: 1.5;
            margin: 0;
            text-shadow: 0 0 10px var(--success-color);
        }

        .processing-indicator {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-md);
            padding: var(--spacing-2xl);
            text-align: center;
            color: var(--text-secondary);
        }

        @media (max-width: 1024px) {
            .content-wrapper {
                grid-template-columns: 1fr;
            }
            .details-grid {
                grid-template-columns: 1fr;
            }
            .detail-section.root-cause {
                grid-column: 1;
            }
        }

        @media (max-width: 768px) {
            .header { padding: var(--spacing-md) var(--spacing-lg); }
            .header-content { flex-direction: column; gap: var(--spacing-md); }
            .main-container { padding: var(--spacing-sm); }
            .main-content { padding: var(--spacing-lg); }
            .title { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const API_URL = 'http://localhost:8000';

        function Header() {
            return (
                <header className="header">
                    <div className="header-content">
                        <div className="logo-section">
                            <div className="logo">🚨</div>
                            <div>
                                <h1 className="title">Autonomous Incident Commander</h1>
                                <p className="subtitle">AI-Powered Incident Response Platform</p>
                            </div>
                        </div>
                        <div className="status-indicator">
                            <div className="status-dot"></div>
                            <span>System Online</span>
                        </div>
                    </div>
                </header>
            );
        }

        function IncidentForm({ onIncidentCreated, loading }) {
            const [alertMessage, setAlertMessage] = useState(
                'CRITICAL: Checkout service experiencing high error rate (12.5%) and elevated P99 latency (5234ms). Payment processing degraded. Database connection pool near exhaustion (98/100).'
            );
            const [severity, setSeverity] = useState('critical');
            const [isSubmitting, setIsSubmitting] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);

                try {
                    const response = await fetch(`${API_URL}/incidents/trigger`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            alert_message: alertMessage,
                            severity: severity
                        })
                    });

                    const data = await response.json();
                    if (onIncidentCreated) {
                        onIncidentCreated(data.incident_id);
                    }
                    setAlertMessage('');
                } catch (error) {
                    alert('Error: ' + error.message);
                } finally {
                    setIsSubmitting(false);
                }
            };

            return (
                <div className="incident-form-container">
                    <h2 className="form-title">📝 Create Alert</h2>
                    <form onSubmit={handleSubmit} className="incident-form">
                        <div className="form-group">
                            <label htmlFor="alert">Alert Message</label>
                            <textarea
                                id="alert"
                                value={alertMessage}
                                onChange={(e) => setAlertMessage(e.target.value)}
                                className="form-textarea"
                                disabled={isSubmitting}
                            />
                        </div>

                        <div className="form-group">
                            <label htmlFor="severity">Severity</label>
                            <select
                                id="severity"
                                value={severity}
                                onChange={(e) => setSeverity(e.target.value)}
                                className="form-select"
                                disabled={isSubmitting}
                            >
                                <option value="critical">🔴 Critical</option>
                                <option value="high">🟠 High</option>
                                <option value="medium">🟡 Medium</option>
                                <option value="low">🟢 Low</option>
                            </select>
                        </div>

                        <button type="submit" disabled={isSubmitting} className="submit-button">
                            {isSubmitting ? (
                                <>
                                    <span className="spinner-small"></span>
                                    Creating...
                                </>
                            ) : (
                                <>⚡ Trigger Incident</>
                            )}
                        </button>
                    </form>
                </div>
            );
        }

        function IncidentList({ incidents, selectedId, onSelect }) {
            return (
                <div className="incident-list-container">
                    <h2 className="list-title">
                        📊 Active Incidents
                        {incidents.length > 0 && <span className="count">{incidents.length}</span>}
                    </h2>
                    {incidents.length === 0 ? (
                        <div className="empty-list">
                            <p>No incidents yet</p>
                            <small>Create one to get started</small>
                        </div>
                    ) : (
                        <div className="incident-list">
                            {incidents.map((incident) => (
                                <div
                                    key={incident.incident_id}
                                    className={`incident-item ${selectedId === incident.incident_id ? 'active' : ''}`}
                                    onClick={() => onSelect(incident.incident_id)}
                                >
                                    <div className="incident-header">
                                        <span className="incident-id">#{incident.incident_id}</span>
                                        <span className={`severity-badge ${incident.severity}`}>
                                            {incident.severity.toUpperCase()}
                                        </span>
                                    </div>
                                    <div className="incident-status">{incident.status || 'Analyzing...'}</div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        function IncidentDetails({ incident }) {
            return (
                <div className="incident-details">
                    <div className="details-header">
                        <div>
                            <h2>Incident #{incident.incident_id}</h2>
                            <p className="incident-timestamp">{new Date(incident.timestamp).toLocaleString()}</p>
                        </div>
                        <div className={`status-badge ${incident.status === 'RESOLVED' ? 'resolved' : incident.status === 'FAILED' ? 'failed' : 'processing'}`}>
                            {incident.status}
                        </div>
                    </div>

                    <div className="details-grid">
                        {incident.commander_analysis && (
                            <section className="detail-section">
                                <h3 className="section-title">🎯 Commander Analysis</h3>
                                <p className="section-content">{incident.commander_analysis}</p>
                            </section>
                        )}

                        {incident.logs_findings && incident.logs_findings.length > 0 && (
                            <section className="detail-section">
                                <h3 className="section-title">📋 Log Findings</h3>
                                <ul className="findings-list">
                                    {incident.logs_findings.map((finding, i) => (
                                        <li key={i}>{finding}</li>
                                    ))}
                                </ul>
                            </section>
                        )}

                        {incident.metrics_findings && incident.metrics_findings.length > 0 && (
                            <section className="detail-section">
                                <h3 className="section-title">📊 Metrics Analysis</h3>
                                <ul className="findings-list">
                                    {incident.metrics_findings.map((finding, i) => (
                                        <li key={i}>{finding}</li>
                                    ))}
                                </ul>
                            </section>
                        )}

                        {incident.deploy_findings && incident.deploy_findings.length > 0 && (
                            <section className="detail-section">
                                <h3 className="section-title">🚀 Deployment Correlation</h3>
                                <ul className="findings-list">
                                    {incident.deploy_findings.map((finding, i) => (
                                        <li key={i}>{finding}</li>
                                    ))}
                                </ul>
                            </section>
                        )}

                        {incident.resolver_suggestions && incident.resolver_suggestions.length > 0 && (
                            <section className="detail-section highlight">
                                <h3 className="section-title">💡 Resolution Recommendations</h3>
                                <ul className="findings-list">
                                    {incident.resolver_suggestions.map((suggestion, i) => (
                                        <li key={i}>{suggestion}</li>
                                    ))}
                                </ul>
                            </section>
                        )}

                        {incident.executed_actions && incident.executed_actions.length > 0 && (
                            <section className="detail-section success">
                                <h3 className="section-title">✅ Executed Actions</h3>
                                {incident.executed_actions.map((action, i) => (
                                    <pre key={i} className="action-log">{action}</pre>
                                ))}
                            </section>
                        )}

                        {incident.root_cause && (
                            <section className="detail-section root-cause">
                                <h3 className="section-title">🔍 Root Cause</h3>
                                <p className="section-content">{incident.root_cause}</p>
                            </section>
                        )}
                    </div>

                    {incident.status === 'PROCESSING' && (
                        <div className="processing-indicator">
                            <span className="spinner"></span>
                            <p>Analyzing incident...</p>
                        </div>
                    )}
                </div>
            );
        }

        function App() {
            const [incidents, setIncidents] = useState([]);
            const [selectedIncident, setSelectedIncident] = useState(null);
            const [incidentDetails, setIncidentDetails] = useState(null);
            const [pollingId, setPollingId] = useState(null);

            const handleIncidentCreated = (newIncidentId) => {
                setIncidents(prev => [...prev, {
                    incident_id: newIncidentId,
                    status: 'PROCESSING',
                    severity: 'critical',
                    timestamp: new Date().toISOString()
                }]);
                setSelectedIncident(newIncidentId);
                startPollingIncident(newIncidentId);
            };

            const startPollingIncident = (incidentId) => {
                if (pollingId) clearInterval(pollingId);

                // Fetch immediately
                fetchIncidentDetails(incidentId);

                // Then poll every second
                const id = setInterval(async () => {
                    try {
                        const response = await fetch(`${API_URL}/incidents/${incidentId}`);
                        const data = await response.json();
                        setIncidentDetails(data);
                        setIncidents(prev => prev.map(incident =>
                            incident.incident_id === incidentId
                                ? { ...incident, status: data.status }
                                : incident
                        ));

                        if (data.status === 'RESOLVED' || data.status === 'FAILED') {
                            clearInterval(id);
                            setPollingId(null);
                        }
                    } catch (error) {
                        console.error('Polling error:', error);
                    }
                }, 1000);

                setPollingId(id);
            };

            const fetchIncidentDetails = async (incidentId) => {
                try {
                    const response = await fetch(`${API_URL}/incidents/${incidentId}`);
                    const data = await response.json();
                    setIncidentDetails(data);
                } catch (error) {
                    console.error('Error fetching incident details:', error);
                }
            };

            const handleSelectIncident = (incidentId) => {
                setSelectedIncident(incidentId);
                fetchIncidentDetails(incidentId);
            };

            return (
                <div className="app">
                    <Header />
                    <main className="main-container">
                        <div className="content-wrapper">
                            <aside className="sidebar">
                                <IncidentForm onIncidentCreated={handleIncidentCreated} />
                                <IncidentList
                                    incidents={incidents}
                                    selectedId={selectedIncident}
                                    onSelect={handleSelectIncident}
                                />
                            </aside>
                            <section className="main-content">
                                {incidentDetails ? (
                                    <IncidentDetails incident={incidentDetails} />
                                ) : selectedIncident ? (
                                    <div className="loading-state">
                                        <div className="spinner"></div>
                                        <p>Loading incident details...</p>
                                    </div>
                                ) : (
                                    <div className="empty-state">
                                        <h3>Select or create an incident</h3>
                                        <p>Choose an incident from the list or create a new one to get started</p>
                                    </div>
                                )}
                            </section>
                        </div>
                    </main>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {

            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',

        button:active {

        button:disabled {

        }

        .workflow-timeline {
            display: flex;

            gap: 15px;
        }

        .timeline-item {
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }

        .timeline-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 40px;
            width: 40px;

            border-radius: 50%;
            background: #f0f0f0;

        }

        .timeline-indicator.pending {

        .timeline-indicator.in-progress {

        .timeline-indicator.completed {

            background: #ffebee;

        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(245, 124, 0, 0.4);
            }
            50% {
                box-shadow: 0 0 0 10px rgba(245, 124, 0, 0);
            }
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: 20px;
            top: 40px;
            width: 2px;
            height: 15px;

        }

        .timeline-item:last-child::before {
            display: none;
        }

        .timeline-content {
            flex: 1;
        }

        .timeline-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .timeline-message {
            font-size: 14px;
            color: #666;
            white-space: pre-wrap;
            line-height: 1.4;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 5px;
        }

        .status-badge.pending {
            background: #e3f2fd;
            color: #1976d2;
        }

        .status-badge.in-progress {
            background: #fff3e0;
            color: #f57c00;
        }

        .status-badge.completed {
            background: #e8f5e9;
            color: #388e3c;
        }

        .status-badge.failed {
            background: #ffebee;
            color: #d32f2f;
        }

        .incident-details-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .detail-row {
            padding: 12px;
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            border-radius: 4px;
        }

        .detail-row strong {
            display: block;
            color: #333;
            margin-bottom: 6px;
            font-size: 14px;
        }

        .detail-value {
            color: #666;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .incidents-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .incident-item {
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .incident-item:hover {
            border-color: #667eea;
            background: #f7f7f7;
        }

        .incident-item.active {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .incident-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .incident-id {
            font-weight: 600;
            color: #333;
        }

        .incident-severity {
            font-size: 12px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .incident-severity.critical {
            background: #ffebee;
            color: #d32f2f;
        }

        .incident-severity.high {
            background: #fff3e0;
            color: #f57c00;
        }

        .incident-root-cause {
            font-size: 13px;
            color: #666;
            margin-top: 5px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .section {
            margin-top: 30px;
        }

        .section h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .findings {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .finding-box {
            background: #f9f9f9;
            padding: 15px;
            border-left: 4px solid #667eea;
            border-radius: 4px;
            font-size: 13px;
            color: #555;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .loading {
            text-align: center;
            color: #888;
            font-size: 14px;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const API_BASE_URL = "http://localhost:8000";

        const Dashboard = () => {
            const [alertMessage, setAlertMessage] = React.useState(
                "CRITICAL: Checkout service experiencing high error rate (12.5%) and elevated P99 latency (5234ms). Payment processing degraded. Database connection pool near exhaustion (98/100). Payment gateway upstream service showing degradation (8.2% error rate)."
            );
            const [severity, setSeverity] = React.useState("critical");
            const [incidents, setIncidents] = React.useState([]);
            const [selectedIncident, setSelectedIncident] = React.useState(null);
            const [incidentDetails, setIncidentDetails] = React.useState(null);
            const [loading, setLoading] = React.useState(false);
            const [updates, setUpdates] = React.useState([]);
            const wsRef = React.useRef(null);

            const handleTriggerIncident = async () => {
                setLoading(true);
                try {
                    const response = await fetch(`${API_BASE_URL}/incidents/trigger`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            alert_message: alertMessage,
                            severity: severity
                        })
                    });

                    const data = await response.json();
                    const newIncidentId = data.incident_id;

                    // Add to incidents list
                    setIncidents(prev => [...prev, {
                        incident_id: newIncidentId,
                        status: "in_progress",
                        severity: severity,
                        timestamp: new Date().toISOString(),
                        root_cause: null
                    }]);

                    // Select the new incident
                    setSelectedIncident(newIncidentId);
                    setUpdates([]);

                    // Start polling for updates
                    startPolling(newIncidentId);

                } catch (error) {
                    alert("Error triggering incident: " + error.message);
                } finally {
                    setLoading(false);
                }
            };

            const startPolling = (incidentId) => {
                const pollInterval = setInterval(async () => {
                    try {
                        const response = await fetch(`${API_BASE_URL}/incidents/${incidentId}`);
                        const data = await response.json();
                        
                        // Update incident details
                        setIncidentDetails(data);
                        
                        // Stop polling if resolved
                        if (data.status === "RESOLVED" || data.status === "FAILED") {
                            clearInterval(pollInterval);
                        }
                    } catch (error) {
                        console.error("Polling error:", error);
                    }
                }, 1000); // Poll every 1 second
            };

            const connectWebSocket = (incidentId) => {
                const wsUrl = `ws://localhost:8000/ws/incidents/${incidentId}`;
                const ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    console.log("WebSocket connected");
                };

                ws.onmessage = (event) => {
                    const update = JSON.parse(event.data);
                    setUpdates(prev => [...prev, update]);
                    
                    // Update incident details
                    if (update.step === 'resolution_complete') {
                        setIncidents(prev => prev.map(inc =>
                            inc.incident_id === incidentId
                                ? { ...inc, status: "resolved" }
                                : inc
                        ));
                    }
                };

                ws.onerror = (error) => {
                    console.error("WebSocket error:", error);
                };

                wsRef.current = ws;
            };

            const fetchIncidentDetails = async (incidentId) => {
                try {
                    const response = await fetch(`${API_BASE_URL}/incidents/${incidentId}`);
                    const data = await response.json();
                    setIncidentDetails(data);
                } catch (error) {
                    console.error("Error fetching incident details:", error);
                }
            };

            const handleSelectIncident = (incidentId) => {
                setSelectedIncident(incidentId);
                fetchIncidentDetails(incidentId);
            };

            return (
                <div className="container">
                    <header>
                        <h1>🚨 Autonomous Incident Commander</h1>
                        <p className="subtitle">Real-time incident response orchestration platform</p>
                    </header>

                    <div className="main-content">
                        {/* Left Column: Create Incident */}
                        <div className="card">
                            <h2>Create Incident Alert</h2>
                            <div className="alert-form">
                                <label>
                                    Alert Message
                                    <textarea
                                        value={alertMessage}
                                        onChange={(e) => setAlertMessage(e.target.value)}
                                        disabled={loading}
                                    />
                                </label>

                                <label>
                                    Severity
                                    <select
                                        value={severity}
                                        onChange={(e) => setSeverity(e.target.value)}
                                        disabled={loading}
                                    >
                                        <option value="critical">Critical</option>
                                        <option value="high">High</option>
                                        <option value="medium">Medium</option>
                                        <option value="low">Low</option>
                                    </select>
                                </label>

                                <button
                                    onClick={handleTriggerIncident}
                                    disabled={loading}
                                >
                                    {loading ? (
                                        <>
                                            <span className="spinner"></span>
                                            Triggering Incident...
                                        </>
                                    ) : (
                                        "Trigger Incident Response"
                                    )}
                                </button>
                            </div>

                            <div className="section">
                                <h3>Active Incidents</h3>
                                {incidents.length === 0 ? (
                                    <div className="empty-state">
                                        <p>No incidents yet. Create one to start.</p>
                                    </div>
                                ) : (
                                    <div className="incidents-list">
                                        {incidents.map(incident => (
                                            <div
                                                key={incident.incident_id}
                                                className={`incident-item ${selectedIncident === incident.incident_id ? 'active' : ''}`}
                                                onClick={() => handleSelectIncident(incident.incident_id)}
                                            >
                                                <div className="incident-header">
                                                    <span className="incident-id">#{incident.incident_id}</span>
                                                    <span className={`incident-severity ${incident.severity}`}>
                                                        {incident.severity.toUpperCase()}
                                                    </span>
                                                </div>
                                                <div className="incident-root-cause">
                                                    {incident.root_cause || "Analyzing..."}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Right Column: Workflow Timeline */}
                        <div className="card">
                            <h2>Incident Response Workflow</h2>
                            {selectedIncident && incidentDetails ? (
                                <div>
                                    {/* Show incident details */}
                                    <div className="incident-details-section">
                                        <div className="detail-row">
                                            <strong>Status:</strong>
                                            <span className={`status-badge ${incidentDetails.status === 'RESOLVED' ? 'completed' : incidentDetails.status === 'FAILED' ? 'failed' : 'in-progress'}`}>
                                                {incidentDetails.status}
                                            </span>
                                        </div>
                                        
                                        {incidentDetails.commander_analysis && (
                                            <div className="detail-row">
                                                <strong>Commander Analysis:</strong>
                                                <div className="detail-value">{incidentDetails.commander_analysis}</div>
                                            </div>
                                        )}
                                        
                                        {incidentDetails.logs_findings && incidentDetails.logs_findings.length > 0 && (
                                            <div className="detail-row">
                                                <strong>Logs Findings:</strong>
                                                <div className="detail-value">
                                                    {incidentDetails.logs_findings.map((finding, i) => <div key={i}>• {finding}</div>)}
                                                </div>
                                            </div>
                                        )}
                                        
                                        {incidentDetails.metrics_findings && incidentDetails.metrics_findings.length > 0 && (
                                            <div className="detail-row">
                                                <strong>Metrics Findings:</strong>
                                                <div className="detail-value">
                                                    {incidentDetails.metrics_findings.map((finding, i) => <div key={i}>• {finding}</div>)}
                                                </div>
                                            </div>
                                        )}
                                        
                                        {incidentDetails.deploy_findings && incidentDetails.deploy_findings.length > 0 && (
                                            <div className="detail-row">
                                                <strong>Deploy Findings:</strong>
                                                <div className="detail-value">
                                                    {incidentDetails.deploy_findings.map((finding, i) => <div key={i}>• {finding}</div>)}
                                                </div>
                                            </div>
                                        )}
                                        
                                        {incidentDetails.resolver_suggestions && incidentDetails.resolver_suggestions.length > 0 && (
                                            <div className="detail-row">
                                                <strong>Resolver Suggestions:</strong>
                                                <div className="detail-value">
                                                    {incidentDetails.resolver_suggestions.map((suggestion, i) => <div key={i}>• {suggestion}</div>)}
                                                </div>
                                            </div>
                                        )}
                                        
                                        {incidentDetails.executed_actions && incidentDetails.executed_actions.length > 0 && (
                                            <div className="detail-row">
                                                <strong>Executed Actions:</strong>
                                                <div className="detail-value">
                                                    {incidentDetails.executed_actions.map((action, i) => (
                                                        <div key={i} style={{fontSize: '0.85em', whiteSpace: 'pre-wrap', backgroundColor: '#f5f5f5', padding: '8px', borderRadius: '4px', marginTop: '4px'}}>
                                                            {action}
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                    
                                    {incidentDetails.status === 'PROCESSING' && (
                                        <div className="loading" style={{marginTop: '20px'}}>
                                            <span className="spinner"></span>
                                            Analyzing incident...
                                        </div>
                                    )}
                                </div>
                            ) : (
                                <div className="empty-state">
                                    <p>Select or create an incident to view workflow</p>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Incident Details Section */}
                    {incidentDetails && (
                        <div className="card">
                            <h2>Incident Details: {incidentDetails.incident_id}</h2>
                            
                            <div style={{ marginBottom: '20px', display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '15px' }}>
                                <div>
                                    <strong>Status:</strong>
                                    <p>{incidentDetails.status}</p>
                                </div>
                                <div>
                                    <strong>Severity:</strong>
                                    <p>{incidentDetails.severity}</p>
                                </div>
                                <div>
                                    <strong>Timestamp:</strong>
                                    <p>{new Date(incidentDetails.timestamp).toLocaleString()}</p>
                                </div>
                                <div>
                                    <strong>Root Cause:</strong>
                                    <p>{incidentDetails.root_cause || 'Analyzing...'}</p>
                                </div>
                            </div>

                            {incidentDetails.logs_findings && incidentDetails.logs_findings.length > 0 && (
                                <div className="section">
                                    <h3>Logs Analysis</h3>
                                    <div className="findings">
                                        {incidentDetails.logs_findings.map((finding, idx) => (
                                            <div key={idx} className="finding-box">{finding}</div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {incidentDetails.metrics_findings && incidentDetails.metrics_findings.length > 0 && (
                                <div className="section">
                                    <h3>Metrics Analysis</h3>
                                    <div className="findings">
                                        {incidentDetails.metrics_findings.map((finding, idx) => (
                                            <div key={idx} className="finding-box">{finding}</div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {incidentDetails.resolver_suggestions && incidentDetails.resolver_suggestions.length > 0 && (
                                <div className="section">
                                    <h3>Resolution Recommendations</h3>
                                    <div className="findings">
                                        {incidentDetails.resolver_suggestions.map((suggestion, idx) => (
                                            <div key={idx} className="finding-box">{suggestion}</div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.render(<Dashboard />, document.getElementById('root'));
    </script>
</body>
</html>
